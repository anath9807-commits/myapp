name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create App Structure
        run: |
          cordova create myapp com.vinay.myapp "Test Pro"
          cp index.html myapp/www/
          cd myapp
          cordova platform add android
          # Yahan debug ki jagah release command hai
          cordova build android --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Release
          # Path badal kar release wala kar diya hai
          path: myapp/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
