name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Process
        run: |
          rm -rf myapp
          cordova create myapp com.vinay.myapp "TestPro"
          cp index.html myapp/www/index.html
          cp config.xml myapp/config.xml
          cd myapp
          cordova platform add android@13.0.0
          cordova build android --release --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Release
          # Smart path to find APK
          path: myapp/platforms/android/app/build/outputs/apk/**/*.apk
