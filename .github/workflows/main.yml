name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create and Build Release
        run: |
          # 1. Project banayein
          cordova create myapp com.vinay.myapp "TestPro"
          
          # 2. Files copy karein
          cp index.html myapp/www/index.html
          if [ -f config.xml ]; then cp config.xml myapp/config.xml; fi
          
          cd myapp
          # 3. Android Licenses accept karein (Zaroori step)
          yes | sdkmanager --licenses || true
          
          # 4. Platform add aur Build
          cordova platform add android
          cordova build android --release --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Release
          path: myapp/platforms/android/app/build/outputs/apk/release/*.apk
