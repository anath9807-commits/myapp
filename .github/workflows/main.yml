name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Final Build Step
        run: |
          # 1. Purana data saaf karein
          rm -rf myapp
          
          # 2. Project banayein (Aapki config.xml ke hisab se)
          cordova create myapp com.vinay.myapp "TestPro"
          
          # 3. Aapki files ko project ke andar copy karein
          cp index.html myapp/www/index.html
          cp config.xml myapp/config.xml
          
          cd myapp
          # 4. SDK 34 ke liye sabse sahi version add karein
          cordova platform add android@13.0.0
          
          # 5. FORCE APK COMMAND (Ye line APK hi banayegi, AAB nahi)
          cordova build android --release --no-telemetry -- --apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: TestPro-Release-APK
          # Ye "Super Path" poore system mein APK dhoondh lega
          path: "**/platforms/android/app/build/outputs/apk/release/*.apk"
          if-no-files-found: error
