name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create App and Build
        run: |
          # 1. Project create karein
          cordova create myapp com.vinay.myapp "TestPro"
          
          # 2. Files ko sahi jagah copy karein (Force copy)
          cp -f index.html myapp/www/index.html
          
          # 3. Check karein agar config.xml hai, toh use project root mein daalein
          if [ -f config.xml ]; then
            cp -f config.xml myapp/config.xml
          fi
          
          # 4. Build process
          cd myapp
          cordova platform add android
          cordova build android --release --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Release
          # Path ko thoda "Smart" banaya hai taaki file kahin bhi ho, mil jaye
          path: myapp/platforms/android/app/build/outputs/apk/release/*.apk
