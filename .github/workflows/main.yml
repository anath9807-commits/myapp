name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create and Build
        run: |
          rm -rf myapp
          cordova create myapp com.vinay.myapp "TestPro"
          
          [ -f index.html ] && cp index.html myapp/www/index.html
          [ -f config.xml ] && cp config.xml myapp/config.xml
          
          cd myapp
          cordova platform add android@13.0.0
          
          # Force APK generation command (Ye sabse zaroori hai)
          cordova build android --release --no-telemetry -- --apk
          
          # APK ko dhoondh kar alag folder mein rakhna
          cd ..
          mkdir -p output_apk
          find myapp/platforms/android/app/build/outputs/ -name "*.apk" -exec cp {} output_apk/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Release-Final
          path: output_apk/*.apk
          if-no-files-found: error
