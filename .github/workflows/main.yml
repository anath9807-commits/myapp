name: Build Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova Globally
        run: npm install -g cordova

      # FIX 1: Create proper Cordova structure and move your files into it
      - name: Create Proper Cordova Project
        run: |
          cordova create mygame com.vinay.myapp "Test Pro"
          cp config.xml mygame/
          cp index.html mygame/www/

      - name: Add Android Platform
        working-directory: ./mygame
        run: cordova platform add android@12.0.0

      # FIX 2: Build RELEASE APK for App Store (Not Debug)
      - name: Build Android Release APK
        working-directory: ./mygame
        run: cordova build android --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Ludo-Release-APK
          path: mygame/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
